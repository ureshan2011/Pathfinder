  SETUP (5 steps):
  1. Create a new Google Spreadsheet → name first sheet "Subscribers"
  2. Extensions → Apps Script → paste the code below → Save
  3. Deploy → New Deployment → Web App

  ──────── Apps Script code (Code.gs) ────────
  function doPost(e) {
    try {
      const ss = SpreadsheetApp.getActiveSpreadsheet();
      const sheet = ss.getSheetByName('Subscribers');
      const data = JSON.parse(e.postData.contents);
      if (!sheet.getLastRow()) {
        sheet.appendRow(['Timestamp', 'Email', 'Language']);
      }
      sheet.appendRow([new Date(), data.email, data.lang]);
      return ContentService
        .createTextOutput(JSON.stringify({ success: true }))
        .setMimeType(ContentService.MimeType.JSON);
    } catch(err) {
      return ContentService
        .createTextOutput(JSON.stringify({ success: false }))
        .setMimeType(ContentService.MimeType.JSON);
    }
  }
  function doGet() {
    return ContentService.createTextOutput('Pathfinder API running.');
  }

    //  AURORA BACKGROUND

    (() => {
      const canvas = document.getElementById('bg-canvas');
      const ctx    = canvas.getContext('2d');
      let W, H;

      const resize = () => {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
      };
      resize();
      window.addEventListener('resize', resize);

      // Each blob: rgb color, relative size, base speed, opacity
      const DEFS = [
        { rgb:[70,95,136],   size:0.60, spd:0.20, op:0.22 },  // surface-tint blue
        { rgb:[72,102,60],   size:0.52, spd:0.16, op:0.18 },  // fern green
        { rgb:[0,33,71],     size:0.75, spd:0.12, op:0.38 },  // deep navy
        { rgb:[174,199,246], size:0.34, spd:0.30, op:0.12 },  // light blue
        { rgb:[72,102,60],   size:0.42, spd:0.24, op:0.15 },  // green accent
        { rgb:[90,60,130],   size:0.30, spd:0.36, op:0.09 },  // violet hint
        { rgb:[70,95,136],   size:0.38, spd:0.28, op:0.13 },  // blue accent
      ];

      const blobs = DEFS.map((d, i) => ({
        ...d,
        x:  Math.random() * window.innerWidth,
        y:  Math.random() * window.innerHeight,
        vx: (Math.random() - 0.5) * d.spd,
        vy: (Math.random() - 0.5) * d.spd,
        phase: i * 1.3,
      }));

      const draw = () => {
        ctx.clearRect(0, 0, W, H);
        ctx.fillStyle = '#000a1e';
        ctx.fillRect(0, 0, W, H);

        const t = Date.now() * 0.0006;

        blobs.forEach((b) => {
          // Organic drift using sine wave offset
          b.x += b.vx + Math.sin(t * 0.5 + b.phase) * 0.15;
          b.y += b.vy + Math.cos(t * 0.4 + b.phase) * 0.15;

          // Wrap around edges
          const r = Math.min(W, H) * b.size;
          if (b.x < -r) b.x = W + r;
          if (b.x > W + r) b.x = -r;
          if (b.y < -r) b.y = H + r;
          if (b.y > H + r) b.y = -r;

          const [cr, cg, cb] = b.rgb;
          const g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, r);
          g.addColorStop(0,    `rgba(${cr},${cg},${cb},${b.op})`);
          g.addColorStop(0.40, `rgba(${cr},${cg},${cb},${(b.op * 0.35).toFixed(3)})`);
          g.addColorStop(1,    `rgba(${cr},${cg},${cb},0)`);

          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(b.x, b.y, r, 0, Math.PI * 2);
          ctx.fill();
        });

        requestAnimationFrame(draw);
      };
      draw();
    })();

    const EL = {
      eyebrow:    't-eyebrow',
      h1a:        't-h1a',
      h1b:        't-h1b',
      h1c:        't-h1c',
      sub:        't-sub',
      cta:        't-cta',
      trust:      't-trust',
      successH:   't-success-h',
      successSub: 't-success-sub',
      stat1:      't-stat1',
      stat2:      't-stat2',
      stat3:      't-stat3',
      rights:     't-rights',
      privacy:    't-privacy',
      terms:      't-terms',
    };

    // Sinhala font applied to these element ids
    const SI_FONT = ['t-eyebrow','t-h1a','t-h1b','t-h1c','t-sub','t-cta','t-trust',
                     't-success-h','t-success-sub','t-stat1','t-stat2','t-stat3'];

    let lang = 'en';

    function applyLang(l) {
      lang = l;
      const c = COPY[l];
      const si = l === 'si';

      Object.entries(EL).forEach(([key, id]) => {
        const el = document.getElementById(id);
        if (!el || !c[key]) return;
        el.textContent = c[key];
        if (SI_FONT.includes(id)) {
          el.style.fontFamily = si ? "'Noto Sans Sinhala', sans-serif" : '';
        }
      });

      const inp = document.getElementById('email-input');
      inp.placeholder = c.emailPH;
      if (si) inp.style.fontFamily = "'Noto Sans Sinhala', sans-serif";
      else    inp.style.fontFamily = '';

      document.documentElement.lang = si ? 'si' : 'en';
    }

    document.querySelectorAll('.lang-pill').forEach(btn => {
      btn.addEventListener('click', () => {
        const l = btn.dataset.lang;
        if (l === lang) return;
        document.querySelectorAll('.lang-pill').forEach(b => {
          b.classList.toggle('active', b === btn);
          b.setAttribute('aria-pressed', String(b === btn));
        });
        applyLang(l);
      });
    });

    applyLang('en');

    // ══════════════════════════════════════════════
    //  FORM SUBMISSION
    //  ↓ Replace with your deployed Google Apps Script URL
    // ══════════════════════════════════════════════
    const ENDPOINT = 'YOUR_GOOGLE_APPS_SCRIPT_URL';

    const formEl     = document.getElementById('email-form');
    const inputEl    = document.getElementById('email-input');
    const submitBtn  = document.getElementById('submit-btn');
    const ctaSpan    = document.getElementById('t-cta');
    const errorEl    = document.getElementById('form-error');
    const successEl  = document.getElementById('success-state');
    const trustEl    = document.getElementById('t-trust');

    const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.remove('off');
      inputEl.classList.remove('shake');
      // Trigger reflow to restart animation
      void inputEl.offsetWidth;
      inputEl.classList.add('shake');
    }

    function hideError() {
      errorEl.classList.add('off');
    }

    inputEl.addEventListener('input', hideError);

    formEl.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = inputEl.value.trim();
      const c = COPY[lang];

      if (!EMAIL_RE.test(email)) {
        showError(c.errEmail);
        return;
      }

      hideError();
      submitBtn.disabled = true;
      ctaSpan.textContent = c.loading;

      try {
        if (ENDPOINT !== 'YOUR_GOOGLE_APPS_SCRIPT_URL') {
          // no-cors: response is opaque — we assume success
          await fetch(ENDPOINT, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, lang, ts: new Date().toISOString() }),
          });
        }

        // Transition to success view
        formEl.classList.add('off');
        trustEl.classList.add('off');
        successEl.classList.remove('off');

      } catch {
        submitBtn.disabled = false;
        ctaSpan.textContent = COPY[lang].cta;
        showError(c.errServer);
      }
    });
  </script>

</body>
</html>
